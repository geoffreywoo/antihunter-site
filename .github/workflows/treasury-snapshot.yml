name: Treasury snapshot

on:
  schedule:
    # Twice daily: midnight UTC (7pm EST) and noon UTC (7am EST)
    # During EDT (Mar–Nov), these run at 8pm and 8am ET.
    - cron: '0 0 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate treasury snapshot
        run: npm run treasury:snapshot
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          ETHEREUM_RPC_URL: ${{ secrets.ETHEREUM_RPC_URL }}

      - name: Validate snapshot
        run: npm run treasury:validate

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/treasury.snapshot.json
          if git diff --cached --quiet; then
            echo "No snapshot changes"
          else
            git commit -m "Treasury snapshot: daily refresh $(date -u +%Y-%m-%d)"
            git push
          fi
