name: QA

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly at 03:17 UTC (~10:17pm ET / 11:17pm EDT)
    - cron: '17 3 * * *'
  workflow_dispatch:

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate treasury snapshot schema + guardrails
        run: npm run treasury:validate

      - name: Link check (dist HTML)
        uses: lycheeverse/lychee-action@v2
        with:
          # Scan built HTML; allow transient failures on rate-limited/public infra.
          args: >-
            --no-progress
            --verbose
            --accept=200,204,206,301,302,303,307,308,403,429
            --retry-wait-time 2
            --max-retries 2
            --timeout 20
            --exclude-mail
            --exclude 'https://(www\.)?twitter\.com/.*'
            --exclude 'https://(www\.)?x\.com/.*'
            --exclude 'https://discord\.gg/.*'
            dist/**/*.html
          fail: true
