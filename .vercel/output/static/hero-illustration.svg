<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" fill="none">
  <defs>
    <radialGradient id="g1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(640 160) rotate(120) scale(420 560)">
      <stop stop-color="#f0abfc" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#e9d5ff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="220" y1="120" x2="780" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f4f4f5" stop-opacity="0.35"/>
      <stop offset="0.55" stop-color="#e9d5ff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#f0abfc" stop-opacity="0.22"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="900" height="600" fill="url(#g1)" opacity="0.85"/>

  <!-- orbital lines -->
  <g opacity="0.65">
    <path d="M158 438c120-196 420-296 620-206" stroke="url(#stroke)" stroke-width="2"/>
    <path d="M178 480c148-176 424-256 590-164" stroke="url(#stroke)" stroke-width="1.6"/>
    <path d="M206 520c178-150 420-206 540-118" stroke="url(#stroke)" stroke-width="1.2"/>
  </g>

  <!-- soft blobs -->
  <g filter="url(#blur)">
    <circle cx="640" cy="160" r="90" fill="#f0abfc" fill-opacity="0.26"/>
    <circle cx="720" cy="240" r="70" fill="#e9d5ff" fill-opacity="0.14"/>
    <circle cx="560" cy="220" r="60" fill="#f4f4f5" fill-opacity="0.10"/>
  </g>
</svg>
